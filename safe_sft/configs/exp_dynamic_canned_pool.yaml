# Régimen DINÁMICO — Alpaca + safety CANNED pool, ratio adaptativo por ASR.
# Idéntico a exp_dynamic_canned_single salvo que la safety usa un POOL de
# paráfrasis (mismos prompts, mismo split, mismo held-out).

experiment_name: exp_dynamic_canned_pool

train_dataset: data/alpaca_train
eval_dataset:  data/alpaca_val
output_dir:    results/exp_dynamic_canned_pool

model_path: models/Llama-3.2-3B-Instruct

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  task_type: CAUSAL_LM

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  logging_steps: 50
  seed: 42

sft:
  max_length: 1024

dynamic:
  base_dataset:   data/alpaca_train
  safety_dataset: data/beavertails_canned_pool_train
  heldout_asr:    data/beavertails_asr_heldout

  total_steps: 9000
  round_steps: 500

  start_ratio: 0.10
  min_ratio:   0.0
  max_ratio:   0.30
  target_asr:  0.20
  deadband_low:  0.15
  deadband_high: 0.25
  delta: 0.05

  asr_heldout_batch_size: 32
  asr_max_new_tokens: 128

wandb:
  project: safe_sft_tfm
  run_name: exp_dynamic_canned_pool
  tags: [alpaca, dynamic, canned_pool, llama32_3b, controller_deadband]
