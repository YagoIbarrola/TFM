# Experimento C — SFT puro sobre MetaMathQA (sin datos de seguridad)
# Mismo schedule e hiperparámetros que Exp A. La única variable independiente
# entre A y C es el dominio del dataset de entrenamiento (general vs narrow).

experiment_name: exp_c_math_pure

train_dataset: data/metamath_train
eval_dataset:  data/metamath_val
output_dir:    results/exp_c

model_path: models/Llama-3.2-3B-Instruct

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  task_type: CAUSAL_LM

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4         # batch efectivo = 16

  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0

  bf16: true
  fp16: false
  gradient_checkpointing: true            # ON: L4 (24GB) requiere reducir activaciones.
                                          # Equivalente matemáticamente a Exp A/B (que corrieron en H100 sin checkpointing),
                                          # solo recomputa activaciones en backward → ~30% más lento pero -50% memoria.

  save_strategy: steps
  save_steps: 500
  save_total_limit: 30

  eval_strategy: steps
  eval_steps: 500
  logging_steps: 10

  dataloader_num_workers: 4
  seed: 42

sft:
  max_length: 1024
  dataset_text_field: text
  packing: false

wandb:
  project: safe_sft_tfm
  run_name: exp_c_math_pure
  tags: [exp_c, metamath, no_safety, llama32_3b, narrow_domain]
