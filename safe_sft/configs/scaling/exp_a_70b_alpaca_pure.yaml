# Experimento A — 70B — SFT puro sobre Alpaca (sin datos de seguridad)
# Réplica de Exp A con Meta-Llama-3.1-70B-Instruct via QLoRA (4-bit NF4).
#
# Memoria estimada en H100 96GB:
#   - Pesos 4-bit: ~35GB
#   - Activaciones + gradientes LoRA + optimizer: ~30-40GB
#   - Total: ~70-75GB → cabe con margen en H100 96GB
#
# Tiempo estimado: ~20-30h (vs ~2h del 3B y ~5h del 8B).
# Batch efectivo = 16, igual que el resto de experimentos.

experiment_name: exp_a_70b_alpaca_pure

train_dataset: data/alpaca_train
eval_dataset:  data/alpaca_val
output_dir:    results/70b/exp_a

model_path: models/Meta-Llama-3.1-70B-Instruct

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  task_type: CAUSAL_LM

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16         # batch efectivo = 16

  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0

  bf16: true
  fp16: false
  gradient_checkpointing: true

  save_strategy: steps
  save_steps: 500
  save_total_limit: 30

  eval_strategy: steps
  eval_steps: 500
  logging_steps: 10

  dataloader_num_workers: 4
  seed: 42

sft:
  max_length: 1024
  dataset_text_field: text
  packing: false

wandb:
  project: safe_sft_tfm
  run_name: exp_a_70b_alpaca_pure
  tags: [exp_a, alpaca, no_safety, llama31_70b, qlora]
