# Experimento Alpaca 5% — Alpaca + 5% BeaverTails filtrado a rechazos limpios
# Parte del diseño factorial {Alpaca, MetaMath} × {0%, 5%, 15%}.
# Mismo safety dataset que Exp E (BeaverTails clean) para comparabilidad.

experiment_name: exp_alpaca_p5_beavertails_clean

train_dataset: data/alpaca_beavertails_clean_5
eval_dataset:  data/alpaca_val
output_dir:    results/exp_alpaca_p5

model_path: models/Llama-3.2-3B-Instruct

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  task_type: CAUSAL_LM

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4          # batch efectivo = 16

  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0

  bf16: true
  fp16: false
  gradient_checkpointing: false           # L40 48GB — cómodo con 3B

  save_strategy: steps
  save_steps: 1000
  save_total_limit: 12

  eval_strategy: steps
  eval_steps: 500
  logging_steps: 10

  dataloader_num_workers: 4
  seed: 42

sft:
  max_length: 1024
  dataset_text_field: text
  packing: false

wandb:
  project: safe_sft_tfm
  run_name: exp_alpaca_p5_beavertails_clean
  tags: [alpaca, safety_5, beavertails_clean, llama32_3b, factorial]
