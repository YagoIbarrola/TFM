# Experimento C — 8B — SFT puro sobre MetaMathQA (sin datos de seguridad)
# Réplica de Exp C con Meta-Llama-3.1-8B-Instruct.

experiment_name: exp_c_8b_math_pure

train_dataset: data/metamath_train
eval_dataset:  data/metamath_val
output_dir:    results/8b/exp_c

model_path: models/Meta-Llama-3.1-8B-Instruct

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  task_type: CAUSAL_LM

training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8

  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0

  bf16: true
  fp16: false
  gradient_checkpointing: true

  save_strategy: steps
  save_steps: 500
  save_total_limit: 30

  eval_strategy: steps
  eval_steps: 500
  logging_steps: 10

  dataloader_num_workers: 4
  seed: 42

sft:
  max_length: 1024
  dataset_text_field: text
  packing: false

wandb:
  project: safe_sft_tfm
  run_name: exp_c_8b_math_pure
  tags: [exp_c, metamath, no_safety, llama31_8b, narrow_domain]
