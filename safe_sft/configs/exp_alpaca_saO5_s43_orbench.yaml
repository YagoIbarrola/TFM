# Estático self-align + anti-over-refusal OR-Bench — Alpaca + 5% pool aumentado.
experiment_name: exp_alpaca_saO5_s43

train_dataset: data/alpaca_orbench_5
eval_dataset:  data/alpaca_val
output_dir:    results/exp_alpaca_saO5_s43

model_path: models/Llama-3.2-3B-Instruct

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  task_type: CAUSAL_LM

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  fp16: false
  gradient_checkpointing: false
  save_strategy: steps
  save_steps: 1000
  save_total_limit: 12
  eval_strategy: steps
  eval_steps: 500
  logging_steps: 10
  dataloader_num_workers: 4
  seed: 43

sft:
  max_length: 1024
  dataset_text_field: text
  packing: false

wandb:
  project: safe_sft_tfm
  run_name: exp_alpaca_saO5_s43
  tags: [alpaca, safety_5, selfalign, orbench, antioverrefusal, llama32_3b]
