model:
  name: meta-llama/Llama-3.2-3B-Instruct
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

peft:
  method: lora
  r: 16
  lora_alpha: 32
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4       # batch efectivo = 16
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  seed: 42

  save_strategy: steps
  save_steps: 500
  save_total_limit: 30                 # mantiene todos los checkpoints del run
  logging_steps: 10
  eval_strategy: no                    # la eval de seguridad la hace el array job externo
  report_to: wandb

tokenizer:
  max_length: 1024
  padding_side: right
  truncation: true

eval:
  harmbench_batch_size: 8
  max_new_tokens: 512
  temperature: 1.0                     # greedy por defecto (do_sample=False)
  do_sample: false
